    shipped:     { c: theme.green,  l: 'shipped' },
    in_progress: { c: theme.orange, l: 'in progress' },
    archived:    { c: theme.dim,    l: 'archived' },
  };
  const s = map[status] || map.archived;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      fontSize: 11, color: s.c, background: s.c + '18',
      padding: '3px 9px', borderRadius: 999, fontWeight: 500, letterSpacing: '.02em',
    }}>
      <span style={{ width: 6, height: 6, borderRadius: 3, background: s.c, display: 'block' }} />
      {s.l}
    </span>
  );
}

// ─── PROJECT CAROUSEL ─────────────────────────────────────────────────────────

function ProjectCarousel({ project, dot }) {
  const [idx, setIdx] = React.useState(0);
  const slides = ['Overview', 'Key flow', 'Detail view', 'Result'];
  const n = slides.length;
  const go = (delta) => setIdx((i) => (i + delta + n) % n);

  React.useEffect(() => {
    const onKey = (e) => {
      if (e.key === 'ArrowLeft') go(-1);
      if (e.key === 'ArrowRight') go(1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  const stripeBg = `repeating-linear-gradient(135deg, ${theme.bgDeep} 0 18px, ${theme.panel} 18px 36px)`;

  return (
    <div style={{ marginTop: 28, border: `1px solid ${theme.border}`, borderRadius: 8, overflow: 'hidden' }}>
      <div style={{ position: 'relative', height: 360, overflow: 'hidden' }}>
        <div style={{
          display: 'flex', height: '100%',
          width: `${n * 100}%`,
          transform: `translateX(-${idx * (100 / n)}%)`,
          transition: 'transform .45s cubic-bezier(.4,.0,.2,1)',
        }}>
          {slides.map((label, i) => (
            <div key={i} style={{
              width: `${100 / n}%`, height: '100%',
              background: stripeBg, position: 'relative',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <div style={{ position: 'absolute', inset: 24, border: `1px dashed ${theme.borderStrong}`, borderRadius: 6, pointerEvents: 'none' }} />
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 10, textAlign: 'center', padding: '0 24px' }}>
                <span style={{ width: 44, height: 44, borderRadius: 22, background: dot, display: 'flex', alignItems: 'center', justifyContent: 'center', color: theme.bg, fontSize: 22, fontWeight: 700 }}>↗</span>
                <div style={{ fontSize: 11, letterSpacing: '.18em', textTransform: 'uppercase', color: theme.dim, fontWeight: 600 }}>product screenshot</div>
                <div style={{ fontSize: 18, color: theme.text, fontWeight: 500 }}>{label}</div>
                <div style={{ fontSize: 12, color: theme.dimmer }}>{project.file} — frame {String(i + 1).padStart(2, '0')} / {String(n).padStart(2, '0')}</div>
              </div>
            </div>
          ))}
        </div>
        {['left', 'right'].map((side) => (
          <button key={side} aria-label={side === 'left' ? 'Previous' : 'Next'} onClick={() => go(side === 'left' ? -1 : 1)} style={{
            position: 'absolute', top: '50%', [side]: 12, transform: 'translateY(-50%)',
            width: 38, height: 38, borderRadius: 19,
            background: 'rgba(0,0,0,.5)', backdropFilter: 'blur(6px)',
            border: `1px solid ${theme.borderStrong}`, color: theme.text,
            fontSize: 22, display: 'flex', alignItems: 'center', justifyContent: 'center',
            cursor: 'pointer', userSelect: 'none',
          }}>{side === 'left' ? '‹' : '›'}</button>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 16px', borderTop: `1px solid ${theme.border}`, background: theme.panel }}>
        <span style={{ fontSize: 12, color: theme.dim }}>{String(idx + 1).padStart(2, '0')} / {String(n).padStart(2, '0')}</span>
        <div style={{ display: 'flex', gap: 6 }}>
          {slides.map((_, i) => (
            <button key={i} onClick={() => setIdx(i)} style={{
              width: i === idx ? 22 : 8, height: 8, borderRadius: 4,
              border: 'none', padding: 0, cursor: 'pointer',
              background: i === idx ? dot : theme.border, transition: 'all .25s',
            }} />
          ))}
        </div>
        <span style={{ fontSize: 11, color: theme.dimmer }}>← → to navigate</span>
      </div>
    </div>
  );
}

// ─── PROJECT DETAIL MODAL ─────────────────────────────────────────────────────

function ProjectDetail({ project, onClose }) {
  React.useEffect(() => {
    const k = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', k);
    document.body.style.overflow = 'hidden';
    return () => { document.removeEventListener('keydown', k); document.body.style.overflow = ''; };
  }, [onClose]);

  if (!project) return null;
  const ext = project.file.split('.').pop();
  const dot = extColor(ext);

  const Section = ({ kicker, c, children }) => (
    <div style={{ marginTop: 32 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, color: c, fontSize: 12, marginBottom: 12, letterSpacing: '.04em', textTransform: 'uppercase', fontWeight: 600 }}>
        <span style={{ width: 6, height: 6, borderRadius: 3, background: c, display: 'block' }} />
        {kicker}
      </div>
      {children}
    </div>
  );

  return ReactDOM.createPortal(
    <div onClick={onClose} style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(0,0,0,.65)', backdropFilter: 'blur(8px)', display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: '60px 20px', overflowY: 'auto' }}>

        <div style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '14px 22px', borderBottom: `1px solid ${theme.border}`, background: theme.bgDeep, borderTopLeftRadius: 10, borderTopRightRadius: 10 }}>
          <span style={{ display: 'flex', gap: 5 }}>
            <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ff5f56', cursor: 'pointer', display: 'block' }} onClick={onClose} />
            <span style={{ width: 10, height: 10, borderRadius: 5, background: '#ffbd2e', display: 'block' }} />
            <span style={{ width: 10, height: 10, borderRadius: 5, background: '#27c93f', display: 'block' }} />
          </span>
          <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6, color: theme.dim, fontSize: 13, marginLeft: 8 }}>
            <span style={{ width: 7, height: 7, borderRadius: 4, background: dot, display: 'block' }} />
            {project.file}
          </span>
          <span style={{ marginLeft: 'auto' }}><StatusPill status={project.status} /></span>
          <button onClick={onClose} style={{ background: 'transparent', border: 'none', color: theme.dim, fontSize: 18, cursor: 'pointer', padding: '0 4px', lineHeight: 1 }}>×</button>
        </div>
        <div style={{ padding: '32px 36px 40px' }}>
          <h2 style={{ margin: 0, fontSize: 36, fontWeight: 700, letterSpacing: '-0.02em', lineHeight: 1.1 }}>{project.title}</h2>
          <p style={{ margin: '12px 0 0', color: theme.dim, fontSize: 18, lineHeight: 1.5 }}>{project.tagline}</p>
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(160px,1fr))', gap: 12, marginTop: 24, padding: '16px 18px', background: theme.bgDeep, border: `1px solid ${theme.border}`, borderRadius: 6 }}>
            {[['role', project.role], ['stack', project.stack.join(' · ')], ['status', project.status.replace('_', ' ')]].map(([k, v]) => (
              <div key={k}>
                <div style={{ fontSize: 10, color: theme.dimmer, letterSpacing: '.06em', textTransform: 'uppercase' }}>{k}</div>
                <div style={{ fontSize: 14, marginTop: 2, color: k === 'stack' ? theme.dim : theme.text }}>{v}</div>
              </div>
            ))}
          </div>
          <ProjectCarousel project={project} dot={dot} />
          <Section kicker="The problem" c={theme.pink}>
            <p style={{ margin: 0, fontSize: 16, lineHeight: 1.65 }}>{project.problem}</p>
          </Section>
          <Section kicker="My approach" c={theme.cyan}>
            <ol style={{ margin: 0, padding: 0, listStyle: 'none' }}>
              {project.approach.map((a, i) => (
                <li key={i} style={{ display: 'flex', gap: 14, padding: '10px 0', borderBottom: i < project.approach.length - 1 ? `1px solid ${theme.border}` : 'none' }}>

        </div>

    </div>,
    document.body
  );
}

            <form onSubmit={(e) => { e.preventDefault(); setSent(true); }} style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              <Field label="your name" field="name" placeholder="Aaron J." />
              <Field label="your email" field="email" placeholder="you@somewhere.com" />
              <Field as="textarea" rows={5} label="message" field="message" placeholder="What's on your mind?" />
              <button type="submit" style={{ alignSelf: 'flex-start', background: theme.pink, color: '#fff', border: 'none', padding: '10px 22px', cursor: 'pointer', fontFamily: 'inherit', fontSize: 14, fontWeight: 600, borderRadius: 6 }}>./send_message.sh →</button>
            </form>
          )}
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
          {[
            { href: PORTFOLIO.links.linkedin, label: 'LinkedIn', sub: 'linkedin.com/in/aaronjohal92', c: theme.cyan, target: '_blank' },
            { href: PORTFOLIO.links.github,   label: 'GitHub',   sub: 'github.com/aaronjohal',      c: theme.green, target: '_blank' },
            { href: PORTFOLIO.links.email,    label: 'Email',    sub: 'hello@aaronjohal.com',       c: theme.yellow },
          ].map(({ href, label, sub, c, target }) => (
            <a key={label} href={href} target={target} rel={target ? 'noreferrer' : undefined}
              style={{ padding: '18px 22px', background: theme.panel, border: `1px solid ${theme.border}`, borderRadius: 8, color: theme.text, textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 14 }}>
              <span style={{ width: 10, height: 10, borderRadius: 5, background: c, display: 'block', flexShrink: 0 }} />
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600 }}>{label}</div>
                <div style={{ color: theme.dim, fontSize: 13 }}>{sub}</div>
              </div>
              <span style={{ color: theme.dim }}>↗</span>
            </a>
          ))}
          <a href="#" onClick={(e) => { e.preventDefault(); alert('In a real deployment this would download the PDF.'); }}
            style={{ padding: '18px 22px', background: theme.panel, border: `1px solid ${theme.border}`, borderRadius: 8, color: theme.text, textDecoration: 'none', display: 'flex', alignItems: 'center', gap: 14 }}>
            <span style={{ width: 10, height: 10, borderRadius: 5, background: theme.purple, display: 'block', flexShrink: 0 }} />
            <div style={{ flex: 1 }}>
              <div style={{ fontWeight: 600 }}>Resume.pdf</div>
              <div style={{ color: theme.dim, fontSize: 13 }}>↓ download · 2 pages</div>
            </div>
            <span style={{ color: theme.dim }}>↓</span>
          </a>
        </div>
      </div>
    </section>
  );
}

// ─── APP ──────────────────────────────────────────────────────────────────────

function App() {
  React.useEffect(() => {
    document.body.style.background = theme.bg;
    document.body.style.color = theme.text;
  }, []);

  const jump = (id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };

  return (
    <div style={{ background: theme.bg, color: theme.text, minHeight: '100vh' }}>
      <TopNav onJump={jump} />
      <Hero />
      <WorkSection />
      <AboutSection />
      <ProcessSection />
      <ContactSection />
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
